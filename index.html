<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Spider-Man Movie Date 🕷️🍿❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0d1b2a,#1b263b,#e62429);
    padding:20px;
}

.container{
    text-align:center;
    width:100%;
    max-width:500px;
    color:white;
}

h1{
    font-size:2.5rem;
    margin-bottom:25px;
}

p{
    font-size:1.25rem;
    line-height:1.6;
    margin-bottom:40px;
}

.message{
    font-size:1.2rem;
    margin:25px 0;
    display:none;
    color:#ffeb3b;
    font-weight:bold;
}

.button-container{
    display:flex;
    flex-direction:column;
    gap:20px;
    align-items:center;
}

button{
    width:240px;
    padding:16px 20px;
    font-size:19px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
}

#yesBtn {
    background: #e62429;
    color: white;
}

#yesBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 20px rgba(230,36,41,0.4);
}

#noBtn {
    background: #1565c0;
    color: white;
    position: fixed;
    z-index: 100;
}

.hidden{
    display:none !important;
}

/* Celebration */
.celebration{
    display:none;
    text-align:center;
    animation:fadeIn 1.5s forwards;
    color:white;
    padding:20px;
}

.celebration h2{
    font-size:2.6rem;
}

.celebration p{
    margin:15px 0 30px;
    font-size:1.3rem;
}

.movie-box{
    width:300px;
    height:300px;
    margin:20px auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:bounce 2s infinite;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.movie-box video{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes bounce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-15px); }
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}

.float{
    position:absolute;
    font-size:28px;
    animation:floatUp linear forwards;
    pointer-events:none;
    z-index: 50;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-20vh);
        opacity:0;
    }
}

/* Custom Notification */
.notification {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(14, 28, 52, 0.95);
    color: white;
    padding: 25px 35px;
    border-radius: 20px;
    font-size: 1.4rem;
    text-align: center;
    display: none;
    z-index: 1000;
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    border: 2px solid #e62429;
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Wanna Go Watch Spider-Man With Me? 🕷️🍿</h1>

    <p>
        Was Wondering..<br><br>
        Spider-Mans always more fun with a good company (YOU).<br><br>
        So... would you mind watching it with me? 😔
    </p>

    <div class="message" id="trickMessage">
         😛 alelele... wrong button! Find the right one smarty
    </div>

    <div class="button-container">
        <button id="yesBtn">YES! 😼</button>
        <button id="noBtn">No ☹️</button>
    </div>
</div>

<div class="celebration" id="celebrate">
    <h2>YAY!! A Spider-Man Date! 🕷️❤️</h2>
    <p>Popcorns on me bbg 😉</p>

    <div class="movie-box">
        <video id="spidermanVideo" autoplay muted playsinline loop>
            <source src="chroma-keyed-video.webm" type="video/webm">
        </video>
    </div>
</div>

<!-- Custom Notification -->
<div class="notification" id="customAlert">
    Can't wait till July 30 😼
</div>

<!-- Music -->
<video id="bgSound" style="display:none;">
    <source src="cat.mp4" type="video/mp4">
</video>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const celebrate = document.getElementById("celebrate");
    const main = document.getElementById("main");
    const trickMessage = document.getElementById("trickMessage");
    const customAlert = document.getElementById("customAlert");

    let attempts = 0;
    let fakeYesClicked = false;

    function moveNoButton() {
        if (!fakeYesClicked) return;

        attempts++;

        // Changed to 7 attempts
        if (attempts >= 7) {
            noBtn.textContent = "YES! 💌";
            noBtn.style.backgroundColor = "#e62429";
            noBtn.removeEventListener("mouseover", moveNoButton);
            noBtn.removeEventListener("touchstart", handleTouch);
            return;
        }

        const padding = 20; // keeps button fully inside screen
        const btnWidth = noBtn.offsetWidth;
        const btnHeight = noBtn.offsetHeight;

        const maxX = window.innerWidth - btnWidth - padding;
        const maxY = window.innerHeight - btnHeight - padding;

        const x = padding + Math.random() * maxX;
        const y = padding + Math.random() * maxY;

        noBtn.style.left = `${x}px`;
        noBtn.style.top = `${y}px`;
    }

    function handleTouch() {
        moveNoButton();
    }

    noBtn.addEventListener("mouseover", moveNoButton);
    noBtn.addEventListener("touchstart", handleTouch);

    yesBtn.addEventListener("click", () => {
        if (!fakeYesClicked) {
            fakeYesClicked = true;
            yesBtn.classList.add("hidden");
            trickMessage.style.display = "block";
        }
    });

    noBtn.addEventListener("click", () => {
        if (attempts >= 7) {
            showCelebration();
        }
    });

    function showCelebration() {
        main.style.display = "none";
        celebrate.style.display = "block";

        const sound = document.getElementById("bgSound");
        const video = document.getElementById("spidermanVideo");

        sound.currentTime = 0;
        sound.volume = 0.6;
        sound.play().catch(() => {});

        video.play().catch(() => {});

        const emojis = ["🕷️", "🕸️", "❤️", "🍿", "🎬", "✨", "🥰"];
        for (let i = 0; i < 80; i++) {
            let el = document.createElement("div");
            el.classList.add("float");
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + "vw";
            el.style.animationDuration = (Math.random() * 3.5 + 2.5) + "s";
            el.style.fontSize = (Math.random() * 28 + 24) + "px";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }

        setTimeout(() => {
            customAlert.style.display = "block";
            setTimeout(() => customAlert.style.display = "none", 2800);
        }, 600);
    }

    // Ensure NO button starts visible
    noBtn.style.position = "relative";
    noBtn.style.left = "auto";
    noBtn.style.top = "auto";
</script>

</body>
</html>
