<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine?</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(to right, #ffafbd, #ffc3a0);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
    position: relative;
}

h1 {
    font-size: 2.5rem;
    color: white;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 20px;
    transition: 0.3s;
}

#yesBtn {
    background-color: #ff4d6d;
    color: white;
}

#noBtn {
    background-color: white;
    color: #ff4d6d;
    position: absolute;
}

/* Celebration Screen */
.celebration {
    display: none;
    text-align: center;
    animation: fadeIn 2s ease-in-out forwards;
}

.celebration h2 {
    font-size: 3rem;
    color: white;
}

/* Gift Box Placeholder */
.gift-box {
    width: 200px;
    height: 200px;
    background: white;
    border-radius: 20px;
    margin: 30px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 5rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Floating hearts & roses */
.heart {
    position: absolute;
    font-size: 24px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Will You Be My Valentine? 💖</h1>
    <button id="yesBtn">Yes 💘</button>
    <button id="noBtn">No 😢</button>
</div>

<div class="celebration" id="celebrate">
    <h2>SHE SAID YES!!! 😭💖🌹</h2>

    <!-- Gift Placeholder -->
    <div class="gift-box">
<video autoplay loop muted playsinline 
       style="width:300px; pointer-events:none;">
  <source src="chroma-keyed-video.webm" type="video/webm">
</video>


    </div>


</div>
<video id="bgSound" style="display:none;" loop>
  <source src="cat.mp4" type="video/mp4">
</video>


<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const celebrate = document.getElementById("celebrate");
const main = document.getElementById("main");
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
});


// YES button celebration
yesBtn.addEventListener("click", () => {
    main.style.display = "none";
    celebrate.style.display = "block";

    // Play sound
    let sound = document.getElementById("bgSound");
    sound.volume = 0.5;
    sound.play();

    // Create floating hearts
    for (let i = 0; i < 70; i++) {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "🌹🐱💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);
    }
});


</script>


</body>
</html>
