<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Happy Birthday🫶🏽🪷</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(to right, #fbc2eb, #a6c1ee);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
    position: relative;
    width: 100%;
    height: 100%;
    padding: 20px;
}

h1 {
    font-size: 2.3rem;
    color: white;
    margin-top: 20vh;
}

.message {
    font-size: 1.3rem;
    color: white;
    margin-top: 10px;
    display: none;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 20px;
}

#yesBtn {
    background-color: #ff6b81;
    color: white;
}

#noBtn {
    background-color: white;
    color: #ff6b81;
    position: fixed;
}

.hidden {
    display: none;
}

/* Celebration */
.celebration {
    display: none;
    text-align: center;
    animation: fadeIn 2s forwards;
}

.celebration h2 {
    font-size: 2rem;
    color: white;
}

/* Gift box */
.gift-box {
    width: 200px;
    height: 200px;
    background: white;
    border-radius: 20px;
    margin: 30px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 5rem;
    animation: bounce 2s infinite;
}

.gift-box video, .gift-box img {
    width: 100%;
    border-radius: 20px;
}

/* Animations */
@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.float {
    position: absolute;
    font-size: 24px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>wanna travel Europe together someday?🤔</h1>
    <div class="message" id="trickMessage">Try finding the REAL surprise button smarty😔</div>

    <button id="yesBtn">Big YES😎</button>
    <button id="noBtn">NO☹️</button>
</div>

<div class="celebration" id="celebrate">
    <h2>HAPPY BIRTHDAY Munchkin!!!🫂💌</h2>

    <!-- Gift Placeholder -->
    <div class="gift-box">
        <video autoplay loop muted playsinline>
            <source src="chroma-keyed-video.webm" type="video/webm">
        </video>
    </div>
</div>

<!-- Background Sound -->
<video id="bgSound" style="display:none;" loop>
    <source src="cat.mp4" type="video/mp4">
</video>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const celebrate = document.getElementById("celebrate");
const main = document.getElementById("main");
const trickMessage = document.getElementById("trickMessage");

let attempts = 0;
let fakeYesClicked = false;

// Move NO button
function moveNoButton() {
    if (!fakeYesClicked) return;

    attempts++;

    if (attempts >= 8) {
        noBtn.textContent = "YESS🫂";
        noBtn.style.backgroundColor = "#ff6b81";
        noBtn.style.color = "white";
        return;
    }

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const padding = 20;
    const maxX = window.innerWidth - btnWidth - padding;
    const maxY = window.innerHeight - btnHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNoButton();
});

// NO becomes YES after attempts
noBtn.addEventListener("click", () => {
    if (attempts >= 8) {
        showCelebration();
    }
});

// Fake YES first
yesBtn.addEventListener("click", () => {
    if (!fakeYesClicked) {
        fakeYesClicked = true;
        yesBtn.classList.add("hidden");
        trickMessage.style.display = "block";
    }
});

function showCelebration() {
    main.style.display = "none";
    celebrate.style.display = "block";

    // Play music
    let sound = document.getElementById("bgSound");
    sound.volume = 0.5;
    sound.play();

    // Floating birthday emojis
    for (let i = 0; i < 60; i++) {
        let el = document.createElement("div");
        el.classList.add("float");
        el.innerHTML = "🍰🩷😛";
        el.style.left = Math.random() * 100 + "vw";
        el.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(el);
    }

    // Optional message popup
    setTimeout(() => {
        alert("Happiest Birthday 🥸🫶🏽!have the best day(you will cause im with you)");
    }, 1000);
}
</script>

</body>
</html>
