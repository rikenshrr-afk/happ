<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Spider-Man Movie Date 🕷️🍿❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0d1b2a,#1b263b,#e62429);
}

.container{
    text-align:center;
    width:100%;
    max-width:500px;
    color:white;
    padding:20px;
}

h1{
    font-size:2.3rem;
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    line-height:1.6;
    margin-bottom:35px;
}

.message{
    font-size:1.2rem;
    margin:25px 0;
    display:none;
    color:#ffeb3b;
    font-weight:bold;
}

.button-container{
    display:flex;
    flex-direction:column;
    gap:18px;
    align-items:center;
}

button{
    width:200px;               /* Smaller buttons */
    padding:14px 20px;
    font-size:17px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition: all 0.2s;
    box-shadow:0 6px 12px rgba(0,0,0,0.3);
}

#yesBtn {
    background: #e62429;
    color: white;
}

#yesBtn:active, #yesBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #ff5252;
}

#noBtn {
    background: #1565c0;
    color: white;
    z-index: 100;
    width: 180px;
}

#noBtn:active, #noBtn:hover {
    box-shadow: 0 0 25px #64b5f6;
    transform: scale(1.05);
}

.hidden{
    display:none !important;
}

/* Celebration */
.celebration{
    display:none;
    text-align:center;
    color:white;
    padding:20px;
}

.celebration h2{
    font-size:2.5rem;
}

.movie-box{
    width:300px;
    height:300px;
    margin:20px auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
}

.movie-box video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.float{
    position:absolute;
    font-size:28px;
    animation:floatUp linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
    from{ transform:translateY(120vh); opacity:1; }
    to{ transform:translateY(-30vh); opacity:0; }
}

.notification {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(14,28,52,0.95);
    color: white;
    padding: 25px 35px;
    border-radius: 20px;
    font-size: 1.4rem;
    display: none;
    z-index: 1000;
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Wanna Go Watch Spider-Man With Me? 🕷️🍿</h1>
    <p>Was Wondering..<br><br>
        Spider-Mans always more fun with a good company (YOU).<br><br>
        So... would you mind watching it with me? 😔
    </p>

    <div class="message" id="trickMessage">
         😛 alelele... wrong button! Find the right one smarty
    </div>

    <div class="button-container">
        <button id="yesBtn">YES! 😼</button>
        <button id="noBtn">No ☹️</button>
    </div>
</div>

<div class="celebration" id="celebrate">
    <h2>YAY!! A Spider-Man Date! 🕷️❤️</h2>
    <p>Popcorns on me bbg 😉</p>

    <div class="movie-box">
        <video id="spidermanVideo" autoplay muted playsinline loop>
            <source src="chroma-keyed-video.webm" type="video/webm">
        </video>
    </div>
</div>

<div class="notification" id="customAlert">
    Can't wait till July 30!😼
</div>

<video id="bgSound" style="display:none;">
    <source src="cat.mp4" type="video/mp4">
</video>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const celebrate = document.getElementById("celebrate");
    const main = document.getElementById("main");
    const trickMessage = document.getElementById("trickMessage");
    const customAlert = document.getElementById("customAlert");

    let attempts = 0;
    let fakeYesClicked = false;

    function moveNoButton() {
        if (!fakeYesClicked) return;

        attempts++;

        if (attempts >= 7) {
            noBtn.textContent = "YES! 💌";
            noBtn.style.backgroundColor = "#e62429";
            return;
        }

        // Use the button's actual rendered size so it never gets clipped
        const rect = noBtn.getBoundingClientRect();
        const btnW = rect.width;
        const btnH = rect.height;

        // First time it dodges: switch from normal flex flow to fixed
        // positioning, seeded at its current spot so it doesn't jump.
        if (noBtn.style.position !== "fixed") {
            noBtn.style.position = "fixed";
            noBtn.style.left = `${rect.left}px`;
            noBtn.style.top = `${rect.top}px`;
        }

        const padding = 20;
        const maxX = Math.max(0, window.innerWidth - btnW - padding * 2);
        const maxY = Math.max(0, window.innerHeight - btnH - padding * 2);

        const x = padding + Math.random() * maxX;
        const y = padding + Math.random() * maxY;

        noBtn.style.left = `${x}px`;
        noBtn.style.top = `${y}px`;
    }

    noBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveNoButton();
    });

    noBtn.addEventListener("mouseover", moveNoButton);

    yesBtn.addEventListener("click", () => {
        if (!fakeYesClicked) {
            fakeYesClicked = true;
            yesBtn.classList.add("hidden");
            trickMessage.style.display = "block";
        }
    });

    noBtn.addEventListener("click", () => {
        if (attempts >= 7) {
            showCelebration();
        }
    });

    function showCelebration() {
        main.style.display = "none";
        celebrate.style.display = "block";

        document.getElementById("bgSound").play().catch(() => {});
        document.getElementById("spidermanVideo").play().catch(() => {});

        const emojis = ["🕷️", "🕸️", "❤️", "🍿", "🎬", "✨", "🥰"];
        for (let i = 0; i < 80; i++) {
            let el = document.createElement("div");
            el.classList.add("float");
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + "vw";
            el.style.animationDuration = (Math.random() * 3.5 + 2.5) + "s";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }

        setTimeout(() => {
            customAlert.style.display = "block";
            setTimeout(() => customAlert.style.display = "none", 2800);
        }, 600);
    }
</script>

</body>
</html>
